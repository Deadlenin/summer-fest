spring:
  application:
    name: event_platform
  config:
    import: optional:file:.env[.properties]
  datasource:
    url: jdbc:postgresql://localhost:5432/event_platform
    username: event_app
    password: event_app_password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: 8080

logging:
  level:
    org.hibernate.SQL: info

app:
  admin:
    username: admin
    password: admin
  notification:
    enabled: ${MAIL_ENABLED:false}
    recipient: ${NOTIFICATION_RECIPIENT:deadlenin24@gmail.com}
    from: ${MAIL_USERNAME:}
