spring:
  application:
    name: event_platform
  datasource:
    url: jdbc:postgresql://localhost:5432/event_platform
    username: event_app
    password: event_app_password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

logging:
  level:
    org.hibernate.SQL: info

app:
  admin:
    username: admin
    password: admin
